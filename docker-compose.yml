version: '3.8'

# One image, three containers — role and topology set via environment variables.
# Services communicate using Docker's internal DNS (service name = hostname).
#
# Start all:   docker-compose up --build
# Stop all:    docker-compose down

services:

  primary:
    build: .
    container_name: cache-primary
    ports:
      - "8080:8080"
    environment:
      CACHE_SERVER_ID: primary-1
      CACHE_SERVER_PORT: "8080"
      CACHE_SERVER_ROLE: PRIMARY
      CACHE_NODE_COUNT: "3"
      # replica service names resolve via Docker DNS
      CACHE_REPLICAS: "replica-1:8081,replica-2:8082"
    networks:
      - cache-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  replica-1:
    build: .
    container_name: cache-replica-1
    ports:
      - "8081:8081"
    environment:
      CACHE_SERVER_ID: replica-1
      CACHE_SERVER_PORT: "8081"
      CACHE_SERVER_ROLE: REPLICA
      CACHE_NODE_COUNT: "3"
      CACHE_PRIMARY: "primary:8080"
    depends_on:
      - primary
    networks:
      - cache-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  replica-2:
    build: .
    container_name: cache-replica-2
    ports:
      - "8082:8082"
    environment:
      CACHE_SERVER_ID: replica-2
      CACHE_SERVER_PORT: "8082"
      CACHE_SERVER_ROLE: REPLICA
      CACHE_NODE_COUNT: "3"
      CACHE_PRIMARY: "primary:8080"
    depends_on:
      - primary
    networks:
      - cache-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  cache-net:
    driver: bridge
