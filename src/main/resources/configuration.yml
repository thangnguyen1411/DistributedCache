server:
  port: 8080
  role: PRIMARY

cache:
  maxEntriesPerNode: 10000
  evictionPolicy: LRU
  defaultTtlSeconds: 3600
  virtualNodeCount: 150
  expirationCleanupIntervalSeconds: 1

nodes:
  - node-1
  - node-2
  - node-3

replication:
  replicas:
    - host: localhost
      port: 8081
    - host: localhost
      port: 8082
