server:
  id: primary-1
  port: 8080
  role: PRIMARY

cache:
  nodeCount: 3
  maxEntriesPerNode: 10000
  evictionPolicy: LRU
  defaultTtlSeconds: 3600
  virtualNodeCount: 150
  expirationCleanupIntervalSeconds: 1

replication:
  replicas:
    - host: localhost
      port: 8081
    - host: localhost
      port: 8082
